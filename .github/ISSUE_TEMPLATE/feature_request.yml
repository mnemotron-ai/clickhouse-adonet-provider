name: Feature request
description: Propose new functionality or an improvement to existing behavior.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please describe the problem
        before the solution — it makes it much easier to evaluate
        alternatives and fit within the existing architecture (see
        `docs/architecture.md`).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's stopping you today?
      placeholder: |
        e.g. GetSchema doesn't expose X, so my tool can't discover Y.
    validations:
      required: true

  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: What should happen instead? Be as concrete as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered, including workarounds you're using today.
    validations:
      required: false
